{% extends 'base.html' %}

{% block title %}Delete Playlist — TajTube{% endblock %}

{% block content %}
<div class="tt-form-wrap">
    <div class="tt-form-card tt-delete-card">

        <div class="mb-4 text-center">
            <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 2.5rem;"></i>
            <h4 class="fw-bold mt-3">Delete Playlist</h4>
            <p class="text-secondary small">This action cannot be undone</p>
        </div>

        <div class="alert alert-danger" role="alert">
            <strong>Warning:</strong> Deleting "<strong>{{ playlist.title }}</strong>" will remove the playlist but not the videos.
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="d-flex gap-2 justify-content-center">
                <a href="{% url 'playlist_detail' playlist.pk %}" class="btn tt-outline-btn">
                    <i class="bi bi-x me-1"></i> Cancel
                </a>
                <button type="submit" class="btn btn-danger">
                    <i class="bi bi-trash me-1"></i> Delete Permanently
                </button>
            </div>
        </form>

    </div>
</div>
{% endblock %}

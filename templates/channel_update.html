{% extends 'base.html' %}

{% block title %}Edit Channel — TajTube{% endblock %}

{% block content %}
<div class="tt-page-wrap tt-form-wrap">

    <div class="tt-form-header">
        <i class="bi bi-pencil-fill text-danger fs-2"></i>
        <h4 class="fw-bold mt-2">Edit Channel</h4>
        <p class="text-secondary small">Update your channel info</p>
    </div>

    <form method="POST" enctype="multipart/form-data" class="tt-form-card">
        {% csrf_token %}
        <div class="mb-3">
            <label class="tt-label">Channel Name</label>
            <input type="text" name="name" class="form-control tt-input" value="{{ channel.name }}" required>
        </div>
        <div class="mb-3">
            <label class="tt-label">Description</label>
            <textarea name="description" class="form-control tt-input tt-textarea" rows="4">{{ channel.description }}</textarea>
        </div>
        <div class="mb-1">
            <label class="tt-label">Channel Avatar</label>
            {% if channel.avatar %}
                <div class="mb-2">
                    <img src="{{ channel.avatar.url }}" alt="Current avatar" class="tt-current-img">
                    <span class="text-secondary small ms-2">Current avatar</span>
                </div>
            {% endif %}
            <input type="file" name="avatar" class="form-control tt-input" accept="image/*">
        </div>
        <div class="mb-4"></div>
        <div class="d-flex gap-2">
            <a href="{% url 'channel_detail' channel.pk %}" class="btn tt-outline-btn w-50">Cancel</a>
            <button type="submit" class="btn tt-red-btn w-50">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}

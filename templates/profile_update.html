{% extends 'base.html' %}
{% block title %}Edit Profile — TajTube{% endblock %}
{% block content %}
<div class="tt-form-wrap">
    <div class="tt-form-card">
        <h4 class="fw-bold mb-4">Edit Profile</h4>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {% if user.avatar %}
                <div class="mb-3">
                    <img src="{{ user.avatar.url }}" alt="Avatar"
                         style="width:80px;height:80px;border-radius:50%;object-fit:cover;">
                    <span class="text-secondary small ms-2">Current photo</span>
                </div>
            {% endif %}
            <div class="mb-3">
                <label class="tt-label">Profile Photo</label>
                <input type="file" name="avatar" class="form-control tt-input" accept="image/*">
            </div>
            <div class="mb-4">
                <label class="tt-label">Bio</label>
                <textarea name="bio" class="form-control tt-input tt-textarea" rows="3"
                          placeholder="Tell something about yourself...">{{ user.bio }}</textarea>
            </div>
            <div class="d-flex gap-2">
                <a href="{% url 'profile' %}" class="btn tt-outline-btn w-50">Cancel</a>
                <button type="submit" class="btn tt-red-btn w-50">Save</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

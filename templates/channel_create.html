{% extends 'base.html' %}

{% block title %}Create Channel — TajTube{% endblock %}

{% block content %}
<div class="tt-page-wrap tt-form-wrap">

    <div class="tt-form-header">
        <i class="bi bi-tv-fill text-danger fs-2"></i>
        <h4 class="fw-bold mt-2">Create your channel</h4>
        <p class="text-secondary small">Start sharing your videos with the world</p>
    </div>

    <form method="POST" enctype="multipart/form-data" class="tt-form-card">
        {% csrf_token %}
        <div class="mb-3">
            <label class="tt-label">Channel Name</label>
            <input type="text" name="name" class="form-control tt-input" placeholder="e.g. My Awesome Channel" required>
        </div>
        <div class="mb-3">
            <label class="tt-label">Description <span class="text-secondary">(optional)</span></label>
            <textarea name="description" class="form-control tt-input tt-textarea" rows="4"
                      placeholder="Tell viewers about your channel..."></textarea>
        </div>
        <div class="mb-4">
            <label class="tt-label">Channel Avatar <span class="text-secondary">(optional)</span></label>
            <input type="file" name="avatar" class="form-control tt-input" accept="image/*">
        </div>
        <div class="d-flex gap-2">
            <a href="{% url 'home' %}" class="btn tt-outline-btn w-50">Cancel</a>
            <button type="submit" class="btn tt-red-btn w-50">Create Channel</button>
        </div>
    </form>
</div>
{% endblock %}

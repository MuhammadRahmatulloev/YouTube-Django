{% extends 'base.html' %}

{% block title %}New Password — TajTube{% endblock %}

{% block content %}
<div class="tt-auth-wrap">
    <div class="tt-auth-card">

        <div class="text-center mb-4">
            <i class="bi bi-lock-fill text-danger" style="font-size: 2.5rem;"></i>
            <h4 class="fw-bold mt-2">Set new password</h4>
            <p class="text-secondary small">Choose a strong password for your account</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="tt-label">New Password</label>
                <input type="password" name="new_password" class="form-control tt-input" placeholder="Enter new password" required autofocus>
            </div>
            <div class="mb-4">
                <label class="tt-label">Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control tt-input" placeholder="Repeat new password" required>
            </div>
            <button type="submit" class="btn tt-red-btn w-100">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
